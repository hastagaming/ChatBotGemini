name: Bot Gemini Test
on:
  push:
  issues:
    types: [opened]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Jalankan Bot
        run: node bot.js
        env:
          # Pastikan kamu sudah set Secret di Settings > Secrets > Actions
          MODEL_CHANGER: ${{ secrets.MODEL_CHANGER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
