name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    # Kita kunci semua perintah agar berjalan di dalam folder android-app
    defaults:
      run:
        working-directory: ./android-app

    steps:
      - uses: actions/checkout@v4

      # Android butuh Java untuk bisa di-build
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Inject API Key
        run: sed -i 's/INSERT_API_KEY_HERE/${{ secrets.GEMINI_API_KEY }}/g' index.html

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pilot-Assistant
          # Path harus mengarah dari root repositori
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
